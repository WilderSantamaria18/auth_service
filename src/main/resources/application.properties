spring.application.name=auth_service


server.port=8081

#Inscribir el microservicio a discovery server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/auth_service
spring.datasource.username=root
spring.datasource.password=123456

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Configure circular reference handling
spring.main.allow-circular-references=true

# JWT Configuration
jwt.secret=mi-clave-super-secreta-proyecto-final-123456789-idat-2024-seguridad-maxima
jwt.expiration=3000000

